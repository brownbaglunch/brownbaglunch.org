baseURL = 'https://brownbaglunch.fr/'
languageCode = 'fr-fr'
defaultContentLanguage = 'fr'
title = 'Brown Bag Lunch'
theme = 'brownbaglunch'

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"

[permalinks]
  [permalinks.page]
    speakers = '/speakers/:slugorcontentbasename/'
  [permalinks.section]
    speakers = '/speakers/:contentbasename/'
  [permalinks.term]
    tags = '/talks/:slug/'

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "public/pagefind"
    target = "static/pagefind"
    disableWatch = true

[languages]
  [languages.fr]
    languageName = 'Français'
    weight = 1
    title = 'Brown Bag Lunch'
  [languages.en]
    languageName = 'English'
    weight = 2
    title = 'Brown Bag Lunch'
