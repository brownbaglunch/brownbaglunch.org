baseURL = 'https://v2.brownbaglunch.org/'
languageCode = 'fr-fr'
defaultContentLanguage = 'fr'
title = 'Brown Bag Lunch'
theme = 'brownbaglunch'

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"

[permalinks]
  [permalinks.page]
    speakers = '/speakers/:slugorcontentbasename/'
  [permalinks.section]
    speakers = '/speakers/:contentbasename/'
  [permalinks.term]
    tags = '/talks/:slug/'

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "public/pagefind"
    target = "static/pagefind"
    disableWatch = true
  # FR gets all content (default language)
  [[module.mounts]]
    source = "content"
    target = "content"
  [module.mounts.sites.matrix]
    languages = ["fr"]
  # EN and DE share speaker and city content (untranslated data)
  [[module.mounts]]
    source = "content/speakers"
    target = "content/speakers"
  [module.mounts.sites.matrix]
    languages = ["en", "de"]
  [[module.mounts]]
    source = "content/cities"
    target = "content/cities"
  [module.mounts.sites.matrix]
    languages = ["en", "de"]

[languages]
  [languages.fr]
    languageName = 'Français'
    weight = 1
    title = 'Brown Bag Lunch'
  [languages.en]
    languageName = 'English'
    weight = 2
    title = 'Brown Bag Lunch'
  [languages.de]
    languageName = 'Deutsch'
    weight = 3
    title = 'Brown Bag Lunch'
